   <style>
@font-face {
    font-family: "MainTxt";
    src: url(fonts/averialight.ttf);

*{
    -webkit-tap-highlight-color: transparent;

html {

body{
    padding: 0;
    margin: 0;
    background-size: cover;
    background-repeat: no-repeat;
    background-attachment: fixed;
    transition: background-color 0.7s ease, background-image 0.7s ease;
}
.darkm, .blackm{
    position: fixed;

    left: 0;
    width: 100%;          
    height: 100%; 
    opacity: 0;
    transition: opacity 0.7s ease;
    z-index: -5;
}
.darkm{
    background-color: #303030;
}
.blackm{
    background-color: #000;
}
li{
    font-family: "MainTxt";
    display: inline
}
.pfp{
    width: 6.25rem;
    margin: 2.5rem 2.5rem 0 5rem;
    border-radius: 25px;
    transition: transform 0.15s;
}
.pfp:hover{
    transform: scale(1.05);
}
#pfpdiv{
    display: inline-block;
}
.left{
    position: absolute;
    display: inline;

}
#ab,#con{
    margin-left: 2.5rem;
}
.left li {
    font-family: "MainTxt";
    display: inline;

}
.left li a{
    font-family: "MainTxt";

}
.left li a:visited,.left li a:link{

}
.right{

}

}
#ig:hover, #mail:hover, #vsco:hover{

}

}

}
.contain {

    margin-top: 2.5rem;

}

.contain2{

}

}
.contain2 img{

#info {

    position: fixed;
    width: 100%;

    z-index: 1;
    opacity: 0;
    transform: translateY(100%);

}
#icon,#icon2 {
    cursor: pointer;
    position: fixed;
    bottom: 0.1rem;

}
#arrow:hover{
    transform: scale(1.15);
}
.arr{
    margin: 6rem 0 6rem 0;

}

}
#icon{

}
#icon2 {

}

}

}
.watermark{

    }

    }

}
@media (max-width:835px){
    #icon,#icon2 {

    }

}
@media (max-width: 610px) {

        width: 2.2rem;
    }

        padding: 0.2rem 0.75rem 0.2rem 0.75rem;

    }
    .pfp{
        width: 5.75rem;
    }
}
@media (max-width: 535px) {
    .watermark img{

    }
}
@media (max-width: 500px) {

        width: 20rem;

    }

    }
}
@media (max-width: 482px) {
    #icon,#icon2 {
        bottom: 1.2rem;
    }
}
@media (max-width: 350px) {
    h1{
        font-size: 1.2rem;
    }
    .contain img{
        width: 17rem;
        border-radius: 10px;
    }
    .contain2{
        margin-top: 35rem;
    }
}
@media (max-width: 353px) {
    html{
        font-size: 90%;
    }
}
@media (max-width: 317px) {
    html{
        font-size: 80%;
    }
}
@media (max-width: 283px) {
    html{
        font-size: 70%;
    }
}
</style>
<script>
var mode;
document.addEventListener("DOMContentLoaded", function() {
    var icon = document.getElementById('icon');
    var info = document.getElementById('info');
    var image = document.getElementById('image');

    window.onload = applyColors;
    window.onload = resetBorder;
    window.onload = applyBorder;
    window.onload = checkWidth;
    window.onload = translateText;
    window.onload = changeLanguage;
    window.onload = infoClick;
    
    function infoClick() {
        if (info.style.opacity === '0') {
            info.style.opacity = '1';
            info.style.transform = 'translateY(0)'; 
            info.style.backgroundColor = '#606060'; 
            image.src = 'photos/infosmall.png'; 
        } else {
            info.style.opacity = '0';
            info.style.transform = 'translateY(100%)'; 
            if (mode === 'black') {
                image.src = 'photos/info_dark.png';
            } else {
                image.src = 'photos/info.png';
            }
        }
    }

    image.addEventListener('click', function (event) {
        infoClick();
    });
    
    var body = document.body;
    var icon2 = document.getElementById('icon2');
    var image2 = document.getElementById('image2');
    var wm = document.getElementById('watermark_img');  
    var ig = document.getElementById('ig');
    var mail = document.getElementById('mail');
    var vsco = document.getElementById('vsco');
    var arrow = document.getElementById('arrow');
    var bord = document.querySelectorAll('.left li a');
    var lang_icon = document.getElementById("textchng");
    var language = localStorage.getItem('language') || 'en';
    var mode = localStorage.getItem('colorMode')|| 'light';
    const dark = document.getElementById('darkm');
    const black = document.getElementById('blackm');

    function applyColors() {
        const elements = getTextElements();
        function getTextElements() {
            return document.querySelectorAll('h1, h2, .contain2 p, .contain2 b, a');
        }
        switch(mode) {

            case 'light':
                dark.style.opacity = '0';
                black.style.opacity = '0';
                body.style.backgroundImage = "url(photos/img.jpg)";
                elements.forEach(el => el.style.color = '#303030');
                image2.src = 'photos/dark.png';
                image.src = 'photos/info.png'; 
                wm.src = 'photos/w.png';
                ig.src = 'photos/ig_logo.png';
                mail.src = 'photos/mail.png';
                vsco.src = 'photos/vsco.png';
                arrow.src = 'photos/black_arr.png';
                if (language === 'en'){
                        lang_icon.src =  'photos/svk.png';
                    } else{
                        lang_icon.src = 'photos/gb.png';
                    }
                break;

            case 'dark':
                dark.style.opacity = '1';
                black.style.opacity = '0';
                body.style.backgroundImage = "";
                elements.forEach(el => el.style.color = 'white');
                image2.src = 'photos/hide.png';
                image.src = 'photos/info.png';
                wm.src = 'photos/ww.png';
                ig.src = 'photos/ig_logo_white.png';
                mail.src = 'photos/mail_white.png';
                vsco.src = 'photos/vsco_white.png';
                arrow.src = 'photos/white_arrow.png';
                if (language === 'en'){
                        lang_icon.src =  'photos/svk_white.png';
                    } else{
                        lang_icon.src = 'photos/gb_white.png';
                    }
                break;

            case 'black':
                dark.style.opacity = '1';
                black.style.opacity = '1';
                body.style.backgroundImage = "";
                elements.forEach(el => el.style.color = 'white');
                image2.src = 'photos/light.png';
                image.src = 'photos/info_dark.png';
                wm.src = 'photos/ww.png';  
                ig.src = 'photos/ig_logo_white.png';
                mail.src = 'photos/mail_white.png';
                vsco.src = 'photos/vsco_white.png';
                arrow.src = 'photos/white_arrow.png';
                if (language === 'en'){
                        lang_icon.src =  'photos/svk_white.png';
                    } else{
                        lang_icon.src = 'photos/gb_white.png';
                    }
                break;
        };
    };

    icon2.addEventListener('click', function() {
        mode = (mode === 'light') ? 'dark' : (mode === 'dark') ? 'black' : 'light';
        applyColors();
        localStorage.setItem('colorMode', mode);
    });

    function resetBorder() {
        bord.forEach(function(item) {
            item.style.border = 'none';
            item.style.fontWeight = 'normal';
        });
    };

    function applyBorder() {
        bord.forEach(function(item) {
            if (mode !== 'white') {
                item.parentElement.style.border = '1px solid gray';
                item.parentElement.style.fontWeight = 'normal';
            } else {
                item.parentElement.style.border = '1px solid white';
                item.parentElement.style.fontWeight = 'bold';
            }
        });
    };  

    function checkWidth() {
        if (window.innerWidth < 950) {
            applyBorder();
        } else {
            resetBorder();
        }
    };

    applyColors(mode);
    checkWidth();
    translateText();
    
});
    var gal_en = "Gallery";
    var gal_sk = "Galéria";
    var ab_en = "About me";
    var ab_sk = "O mne";
    var con_en = "Contact";
    var con_sk = "Kontakt";
    var intro_en = "It is an illusion that photos are made with the camera… they are made with the eye, heart, and head.<br>~Henri Cartier-Bresson~";
    var rules_en = "© If you wish to use any of the images on this website, contact me for permission. Any unauthorised use isn't allowed";
    var rules_sk = "© Ak chcete použiť niektorý z obrázkov na tejto webovej stránke, kontaktujte ma o povolenie. Akékoľvek neoprávnené použitie nie je povolené";
    var intro_sk = "Je ilúzia, že fotky sú tvorené kamerou… sú tvorené okom, srdcom, a hlavou.<br>~Henri Cartier-Bresson~";
    var story_en = `
                    <b>Welcome to my photography website!</b><br>
                    <br>
                    Hello there! I'm Filip, a 21-year-old photographer from the town called Považská Bystrica<br> 
                    in Slovakia. Photography has been my journey of self&nbsp-&nbspdiscovery that I want to share with you.<br>
                    <br>
                    <b>Evolution of my photography:</b><br>
                    <br>
                    My photography adventure began with the wonderful landscapes and the raw beauty of nature that<br> 
                    surrounds my hometown. As I continued with my journey, I found myself drawn to the world of animals.<br> 
                    I discovered a new dimension in storytelling through animal photography. Each click was aimed at<br> 
                    capturing the essence and emotion of the creatures that live on our planet. My latest obsession has<br> 
                    become macro photography, which allows me to explore the details that often go unnoticed.<br>
                    <br>
                    <b>Versatility in vision:</b><br>
                    <br>
                    Even with my newfound passion for macro photography, I embrace the versatility of my craft.<br> 
                    There are moments when I'm drawn to the untamed beauty of nature and her animals.<br>
                    <br>
                    <b>My philosophy:</b><br>
                    <br>
                    For me, photography is a journey of constant growth and exploration.<br> 
                    It's about freezing moments in time, telling stories, and recreating emotions through visuals.<br>
                    <br>
                    <b>Connect with me:</b><br>
                    <br>
                    I believe that personal connection is key to creating memorable photographs. So, whether you're a<br> 
                    fellow photography enthusiast or someone looking to capture a special moment,<br>
                    I invite you to explore my portfolio and get in touch with me if necessary.<br>
                    `;
    var story_sk = `
                    <b>Vitajte na mojej fotografickej stránke!</b><br>
                    <br>
                    Zdravím! Som Filip, 21-ročný fotograf z mesta Považská Bystrica<br> 
                    na Slovensku. Fotografia bola mojou cestou k sebauvedomeniu, ktorú chcem s vami zdieľať.<br>
                    <br>
                    <b>Evolúcia mojej fotografie:</b><br>
                    <br>
                    Moje dobrodružstvo s fotografiou začalo s nádhernými krajinami a surovou krásou prírody,<br> 
                    ktorá obklopuje moje rodisko. Pokračoval som v ceste a našiel som sa v svete zvierat.<br> 
                    Objavil som nový rozmer rozprávania prostredníctvom fotografií zvierat. Každé stlačenie spúšte bolo zamerané na<br> 
                    zachytenie podstaty a emócií tvorov, ktoré žijú na našej planéte. Mojím posledným záujmom sa<br> 
                    stala makrofotografia, ktorá mi umožňuje preskúmať detaily, ktoré často prechádzajú nepovšimnuté.<br>
                    <br>
                    <b>Všestrannosť vo vizii:</b><br>
                    <br>
                    Aj napriek mojej novovzniknutej vášni pre makrofotografiu, vítam všestrannosť svojho remesla.<br> 
                    Sú momenty, kedy ma ťahá k nedotknutej kráse prírody a jej zvierat.<br>
                    <br>
                    <b>Moja filozofia:</b><br>
                    <br>
                    Pre mňa je fotografia cestou neustáleho rastu a objavovania.<br> 
                    Je to o zmrazovaní okamihov v čase, rozprávaní príbehov a znovu vytváraní emócií pomocou vizuálov.<br>
                    <br>
                    <b>Spojte sa so mnou:</b><br>
                    <br>
                    Verím, že osobná spojitosť je kľúčom k tvorbe nezabudnuteľných fotografií. Takže či ste<br> 
                    fotografický nadšenec alebo niekto, kto hľadá zachytenie špeciálneho okamihu,<br>
                    pozývam Vás, aby ste preskúmali moje portfólio a prípadne ma kontaktovali.<br>
                    `;
    function translateText() {
        var text_gal = document.getElementById("gal2");
        var text_ab = document.getElementById("ab2");
        var text_con = document.getElementById("con2");
        var text_intro = document.getElementById("intro");
        var text_story = document.getElementById("story");
        var text_rules = document.getElementById("rules");
        var lang_icon = document.getElementById("textchng")
        var mode = localStorage.getItem('colorMode') || 'light';
        var language = localStorage.getItem('language') || 'en';

        if (language === 'en') {
            text_gal.textContent = gal_en;
            text_ab.textContent = ab_en;
            text_con.textContent = con_en;
            text_intro.innerHTML = intro_en;
            text_story.innerHTML = story_en;
            text_rules.textContent = rules_en;
            if (mode === 'light'){
                    lang_icon.src =  'photos/svk.png';
                } else{
                    lang_icon.src = 'photos/svk_white.png';
                }
        } else {
            text_gal.textContent = gal_sk;
            text_ab.textContent = ab_sk;
            text_con.textContent = con_sk;
            text_intro.innerHTML = intro_sk;
            text_story.innerHTML = story_sk;
            text_rules.textContent = rules_sk;
            if (mode === 'light'){
                    lang_icon.src =  'photos/gb.png';
                } else{
                    lang_icon.src = 'photos/gb_white.png';
                }
        }      
    }

    function changeLanguage() {
            var language = (localStorage.getItem('language') === 'en') ? 'sk' : 'en';
            localStorage.setItem('language', language);
            translateText();
    }

    checkWidth();
</script>
</body>
</html>
