<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilMin Frames</title>
    <link rel="icon" type="image/x-icon" href="photos/pfp_circle.png">
</head>
<body>
    <header>
        <div id = "pfpdiv"><a href="index.html"><img class="pfp" src="photos/pfp.jpg" alt="Profilova_fotka" title="Home Page"></a></div>
        <ul class="left">
            <li id="gal"><a href="Nature_Gallery.html" id="gal2">Gallery</a></li>
            <li id="ab"><a href="about.html" id="ab2">About me</a></li>
            <li id="con"><a href="contact.html" id="con2">Contact</a></li>
        </ul>
        <ul class="right">
            <li><a href="https://www.instagram.com/fil_min/"><img id="ig" src="photos/ig_logo.png" alt="Instagram" title="Instagram Link"></a></li>
            <li><a href="mailto:filminphotography@gmail.com"><img id="mail" src="photos/mail.png" alt="Mail" title="Mail Link"></a></li>
            <li><a href="https://vsco.co/filminframes/gallery"><img id="vsco" src="photos/vsco.png" alt="VSCO" title="VSCO Link"></a></li>
        </ul>
        <img id="textchng" src="photos/svk.png" onclick="changeLanguage()" title="EN <-> SK">
</header>
<div class="darkm" id="darkm"></div>
<div class="blackm" id="blackm"></div>
    <div class="contain">
        <h3 id="intro">Welcome to FilMin.Frames</h3>
        <p id="info">I'm a passionate nature photographer, <br>based in Považská Bystrica, Slovakia</p>
        <a href="Nature_Gallery.html" id="port">Discover my portfolio</a>       
    </div>
    <div class="dd">
        <img src="2d/home6.png">
        <img src="2d/home4.png">
        <img src="2d/home3.png">
        <img src="2d/home2.png">
        <img src="2d/home5.png">
        <img src="2d/home7.png">
    </div>
    <style>
@font-face {
font-family: "MainTxt";
src: url(fonts/averialight.ttf);
}
@font-face {
    font-family: "Shadows";
    src: url(fonts/shadows.ttf);
}
*{
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -khtml-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    outline: none;
    -webkit-tap-highlight-color: transparent;
}
body{
    padding: 0;
    margin: 0;
    background-size: cover;
    background-repeat: no-repeat;
    background-attachment: fixed;
    transition: background-color 0.7s ease, background-image 0.7s ease;
}
.darkm, .blackm{
    opacity: 0;
    position: fixed;    
    top: 0;
    left: 0;
    width: 100%;          
    height: 100%; 
    transition: opacity 0.7s ease;
    z-index: -5;
}
.darkm{
    background-color: #303030;
}
.blackm{
    background-color: #000;
}
li{
    font-family: "MainTxt";
    display: inline
}
.pfp{
    width: 6.25rem;
    margin: 2.5rem 2.5rem 0 5rem;
    border-radius: 25px;
    float: left;
    transition: transform 0.15s;
}
.pfp:hover{
    transform: scale(1.05);
}
.left{
    float: left;
    list-style: none;
    text-align: left;
    text-decoration: none;
    margin-top: 4.7rem;
}
#gal,#ab,#con{
    font-size: 1.25rem;
    vertical-align: middle;
    color: rgb(80, 80, 80);
}
#ab,#con{
    margin-left: 2.5rem;
}
.left li {
    font-family: "MainTxt";
    display: inline;
    transition: transform 0.15s;
}
.left li a{
    font-family: "MainTxt";
    text-decoration: none;
    color: rgb(80, 80, 80);
    display: inline-block;
    transition: transform 0.15s;
   
}
.left li a:visited,.left li a:link{
    color:rgb(80, 80, 80);
}
.right{
    float: right;
    margin-top: 4.4rem;
    padding-right: 5rem;
}
#ig, #mail, #vsco{
    width: 2.5rem;
    transition: transform 0.15s;
}
#mail, #vsco{
    margin-left: 2rem;
}
#ig:hover, #mail:hover, #vsco:hover{
    transform: scale(1.15);
}
.left li a:hover, .left li:hover {
    transform: scale(1.1);
    color: rgb(50, 50, 50);
}
#textchng:hover{
    transform: scale(1.12);
}
#textchng{
    height: 2.2rem;
    border-radius: 6px;
    margin: 4.5rem 1rem 0 0;
    float: right;
    cursor: pointer;
    transition: transform 0.15s;
}
.contain {
    text-align: center;
    position: absolute;
    margin: 20rem 0 2rem 0;
    top: 0;
    left: 0;
    right: 0;
}
.contain h3{
    margin: 2.5rem 0 0 0;
    font-family: "Shadows";
    font-size: 3rem;
    color: rgb(80, 80, 80);
}
.contain p{
    font-family: "MainTxt";
    margin: 2rem 0 4rem 0;
    font-size: 1.8rem;
    color: rgb(80, 80, 80);
}
.contain a{
    font-family: "MainTxt";
    font-size: 1.8rem;
    border: 1px solid rgb(75, 75, 75);
    padding: 1.6rem;
    border-radius: 20px;
    text-decoration: none;
    color:rgb(75, 75, 75);;
}
#port{
    display: inline-block;
    transition: transform 0.35s;
}
#port:hover{
    transform: scale(1.1);
}
.dd{
    display: flex;
    flex-direction: row;
    position: fixed;
    justify-content: center;
    width: 100%;
    gap: 10rem;
    bottom: 0;
    margin-bottom: 0.2rem;
}
.dd img{
    height: 8rem;
}
@media (max-width: 1530px) {
    .dd{
        gap: 6rem;;
    }
    .dd img{
        height: 6rem;
    }  
}
@media (max-width: 1300px) {
    .pfp{
        margin: 2.5rem 0 0 5rem;
    }
    .contain h3{
        font-size: 2.5rem;
    }
    .contain p{
        font-size: 1.5rem;
    }
}
@media (max-width: 1090px) {
    .left, .right, .pfp {
        float: none;
        display: flex;
        justify-content: center; 
        align-items: center;
    }
    .left{
        padding: 1rem 0 1rem 0;
    }
    #pfpdiv{
        display: flex;
        justify-content: center;
    }
    .left, .right{
        margin: 0 auto; 
    }
    .right, .pfp {
        padding: 1rem;
    }
    #textchng{
        float: none;
        margin: 0 auto;
        display: flex;
        justify-content: center; 
        align-items: center;
        margin-top: 1rem;
    }
    .left li {
        text-align: center;
        padding: 0.2rem 0.8rem 0.2rem 0.8rem;
        border: 1px solid grey;
        border-radius: 10px;
    }
    #ab,#con{
        margin-left: 0.5rem;
    }
    .pfp{
        margin: 1rem 0.5rem 0 0;
        border-radius: 40px;
    }
    #con{
        margin-right: 0;
    }
    #mail, #vsco{
        margin-left: 4rem;
    }
    .contain{
        margin: 30rem 2rem 2rem 2rem;
    }
    .contain a:hover{
        padding: 1.5rem;
        font-size: 1.7rem;
    }
    .contain p{
        font-size: 1.25rem;
    }
    .contain a{
        padding: 1rem;
        font-size: 1.5rem;
    }
    .contain h3{
        font-size: 2rem;
    }
    .dd{
        gap: 5rem;;
    }
    .dd img{
        height: 5rem;
    }  
    .left li:hover {
        transform: scale(1.07);
        color: rgb(50, 50, 50);
    }
}
@media (max-width: 800px) {
    .dd{
        gap: 4rem;
    }
    .dd img{
        height: 4rem;
    } 
}
@media (max-height: 890px) {
    .dd{
        display: none;
    }
}
@media (max-width: 665px) {
    .contain{
        margin-bottom: 3rem;
        margin-top: 25rem;
    }
    .contain a:hover{
        padding: 1rem;
        font-size: 1.6rem;
    }
    .dd{
        display: none;
    }
}
@media (max-width: 610px) {
    #ig,#mail,#vsco{
        width: 2.2rem;
    }
    .left li {
        padding: 0.2rem 0.75rem 0.2rem 0.75rem;
    }

}
@media (max-width: 600px) {
    .contain p{
        font-size: 1.2rem;
    }
    .contain a{
        font-size: 1rem;
    }
    .pfp{
        width: 5.75rem;
    }
    .contain a:hover{
        padding: 0.8rem;
        font-size: 1.3rem;
    }
}
@media (max-width: 500px) {
    .contain a:hover{
        padding: 0.9rem;
        font-size: 1.2rem;
    }
}

@media (max-width: 463px) {
    @media (min-width: 394px) {
        @media (max-height: 740px) {
            .contain{
                margin: 20rem 2rem 10rem 2rem;
            }
        }
    }
}
@media (max-width: 393px) {
    @media (min-width: 310px) {
        @media (max-height: 790px) {
            .contain{
                margin: 22rem 2rem 10rem 2rem;
                padding-bottom: 4rem;
            }
            
        }
    }
}
@media (max-width: 353px) {
    html{
        font-size: 90%;
    }
}
@media (max-width: 317px) {
    html{
        font-size: 80%;
    }
}
@media (max-width: 283px) {
    html{
        font-size: 70%;
    }
}
</style>
<script>
    var gal_en = "Gallery";
    var gal_sk = "Galéria";
    var ab_en = "About me";
    var ab_sk = "O mne";
    var con_en = "Contact";
    var con_sk = "Kontakt";
    var intro_en = "Welcome to FilMin.Frames";
    var intro_sk = "Vitajte na FilMin.Frames";
    var info_en = "I'm a passionate nature photographer,<br> based in Považská Bystrica, Slovakia";
    var info_sk = "Som vášnivý fotograf prírody <br>z Považskej Bystrice, Slovensko"
    var port_en = "Discover my portfolio";
    var port_sk = "Objavte moje portfólio";
    
    window.onload = translateText;
    window.onload = applyColors;

    function translateText() {
        var text_gal = document.getElementById("gal2");
        var text_ab = document.getElementById("ab2");
        var text_con = document.getElementById("con2");
        var text_intro = document.getElementById("intro");
        var text_info = document.getElementById("info");
        var text_port = document.getElementById("port");
        var lang_icon = document.getElementById("textchng")
        var language = localStorage.getItem('language') || 'en';

        if (language === 'en') {
            text_gal.textContent = gal_en;
            text_ab.textContent = ab_en;
            text_con.textContent = con_en;
            text_intro.textContent = intro_en;
            text_info.innerHTML = info_en;
            text_port.textContent = port_en;
            if (mode === 'light'){
                    lang_icon.src =  'photos/svk.png';
                } else{
                    lang_icon.src = 'photos/svk_white.png';
                }
        } else {
            text_gal.textContent = gal_sk;
            text_ab.textContent = ab_sk;
            text_con.textContent = con_sk;
            text_intro.textContent = intro_sk;
            text_info.innerHTML = info_sk;
            text_port.textContent = port_sk;
            if (mode === 'light'){
                    lang_icon.src =  'photos/gb.png';
                } else{
                    lang_icon.src = 'photos/gb_white.png';
                }
        }      
    }

    function changeLanguage() {
        var language = (localStorage.getItem('language') === 'en') ? 'sk' : 'en';
        localStorage.setItem('language', language);
        translateText();
    }

    var body = document.body;
    var elements = document.querySelectorAll('h3,.contain p,a');
    var ig = document.getElementById('ig');
    var mail = document.getElementById('mail');
    var vsco = document.getElementById('vsco');
    var lang_icon = document.getElementById("textchng");
    var bord = document.querySelectorAll('.left li a'); 
    var language = localStorage.getItem('language') || 'en';
    var mode = localStorage.getItem('colorMode')|| 'light';
    const dark = document.getElementById('darkm');
    const black = document.getElementById('blackm');

    function applyColors() {
        switch(mode) {

            case 'light':
                dark.style.opacity = '0';
                black.style.opacity = '0';
                body.style.backgroundImage = "url(photos/img.jpg)";
                elements.forEach(function(item) {
                    item.style.color = '#303030';
                });
                ig.src = 'photos/ig_logo.png';
                mail.src = 'photos/mail.png';
                vsco.src = 'photos/vsco.png';
                if (language === 'en'){
                        lang_icon.src =  'photos/svk.png';
                    } else{
                        lang_icon.src = 'photos/gb.png';
                    }
                break;

            case 'dark':
                dark.style.opacity = '1';
                black.style.opacity = '0';
                body.style.backgroundImage = "";
                elements.forEach(function(item) {
                    item.style.color = 'white';
                });
                ig.src = 'photos/ig_logo_white.png';
                mail.src = 'photos/mail_white.png';
                vsco.src = 'photos/vsco_white.png';
                if (language === 'en'){
                        lang_icon.src =  'photos/svk_white.png';
                    } else{
                        lang_icon.src = 'photos/gb_white.png';
                    }
                break;

            case 'black':
                dark.style.opacity = '1';
                black.style.opacity = '1';
                body.style.backgroundImage = "";
                elements.forEach(function(item) {
                    item.style.color = 'white';
                });
                ig.src = 'photos/ig_logo_white.png';
                mail.src = 'photos/mail_white.png';
                vsco.src = 'photos/vsco_white.png';
                if (language === 'en'){
                        lang_icon.src =  'photos/svk_white.png';
                    } else{
                        lang_icon.src = 'photos/gb_white.png';
                    }
                break;
        };
    };
    applyColors();
    translateText();
</script>
</body>
</html>
